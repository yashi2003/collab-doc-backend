version: '3.8'

services:
  # MongoDB - stores documents, operation logs, and snapshots
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Pub/Sub for cross-node broadcasting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Node 1
  app-node-1:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/collab_docs
      SPRING_REDIS_HOST: redis
      HOSTNAME: node-1
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Application Node 2 (demonstrates horizontal scaling)
  app-node-2:
    build: .
    ports:
      - "8081:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/collab_docs
      SPRING_REDIS_HOST: redis
      HOSTNAME: node-2
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mongo_data:
